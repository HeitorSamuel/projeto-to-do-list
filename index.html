<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="estilos/style.css">
    <script src="https://kit.fontawesome.com/b34db1811f.js" crossorigin="anonymous"></script>
</head>
<body>
    <main>
        <section class="tela-task">
            <div class="titulo">
                <h1>Minha Lista de Tarefas</h1>
            </div>
            <div class="input-button">
                <input type="text" name="txtinput" id="txtinput" placeholder="Digite uma nova tarefa" required>
                <input type="button" id="botao-add" value="Adicionar" onclick="adicionar()">
            </div>           
            <script src="script.js"></script>
        </section>
    </main>
</body>
</html>
